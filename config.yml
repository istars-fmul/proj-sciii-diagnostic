dataset: 
        cephalometric_measurements: 'data/cephalometric_measurements.csv'
        cephalometric_measurements_korean: 'data/korean/korean_cephalometric_measurements.csv'
        landmark_coordinates: 'data/landmark_coordinates.csv'
        landmark_coordinates_korean: 'data/korean/korean_landmark_coordinates.csv'
        patient_info_korean : 'data/korean/korean_patient_info.csv'
        patient_info: 'data/patient_info.csv'
        coord_annotation_reliability: 'data/check_coord_reliability.csv'


style: 
    family: 'Helvetica'
    size: 12
    title_size: 16
    color: 'black'

colors:
    gender: 
        F: "pink"
        M: "lightblue"
    cluster: 
        1: '#1B9E77'
        2: '#D95F02'
        3: '#7570B3'
        4: '#E7298A'
        5: '#66A61E'
        6: '#E6AB02'
    treatment: 
        non-surgery: "blue"
        surgery: "red"
    anatomical_lines:
        cranial_base: "violet"
        maxilla: "orange"
        mandible: "lightgreen"
    measurement_type: 
        angular: "violet"
        linear: "lightgreen"
        proportion: "orange"
    
selected_landmark:
    - Sella
    - Basion
    - PNS
    - A Point
    - B Point
    - Pogonion
    - Menton
    - Gonion
    - Ramus Point
    - Distal Aspect of Condyle
    - Condylion
    - Nasion

anatomical_lines:
    cranial_base:
        - Nasion
        - Sella
        - Basion
    maxilla:
        - PNS
        - A Point
    mandible: 
        - B Point
        - Pogonion
        - Menton
        - Gonion
        - Ramus Point
        - Distal Aspect of Condyle
        - Condylion

clustering_parameters:
    n_clusters: 6
    fun_cluster: 'kmeans'
    hc_metric: 'euclidean'
    hc_method: NULL

clustering_cross_validation: 
    n_folds: 5
    n_nearst_neighbours: 25
    random_state: 42
